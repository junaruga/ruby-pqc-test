name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rubygems-http:
    name: rubygems HTTP server/client
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4

      - &setup-ruby
        name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}

      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup.sh

      # Fix handling RDoc::Servlet rename to RDoc::RI::Servlet
      # https://github.com/rubygems/rubygems-server/pull/14
      - &clone-rubygems-server
        name: Clone rubygems-server (workaround for ruby-head)
        if: matrix.ruby-version == 'head'
        run: git clone https://github.com/ruby/rubygems-server.git ~/git/ruby/rubygems-server

      - name: Run HTTP server and client
        run: |
          script/run_http_server.sh &
          sleep 3
          script/run_http_client.sh

  rubygems-https-direct:
    name: rubygems HTTPS direct (WEBrick)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup.sh

      - name: Run HTTPS server and client
        run: |
          script/run_https_server.rb &
          sleep 3
          script/run_https_client.sh

  rubygems-https-reverse-proxy-ruby-openssl:
    name: rubygems HTTPS TLS reverse proxy (Ruby OpenSSL)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup.sh

      - *clone-rubygems-server

      - name: Run HTTP server, TLS proxy, and client
        run: |
          script/run_http_server.sh &
          sleep 2
          script/run_https_reverse_proxy.rb &
          sleep 2
          script/run_https_client.sh

  rubygems-https-reverse-proxy-nginx:
    name: rubygems HTTPS TLS reverse proxy (Nginx)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup_nginx.sh

      - *clone-rubygems-server

      - name: Run HTTP server, Nginx TLS proxy, and client
        run: |
          script/run_http_server.sh &
          sleep 2
          script/run_https_reverse_proxy_nginx.sh &
          sleep 2
          script/run_https_client.sh

  rubygems-pqc-https-direct:
    name: rubygems PQC HTTPS direct (WEBrick)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup.sh

      - name: Run PQC HTTPS server and client
        run: |
          script/run_https_server.rb -p &
          sleep 3
          script/run_https_client.sh -p

  rubygems-pqc-https-reverse-proxy-ruby-openssl:
    name: rubygems PQC HTTPS TLS reverse proxy (Ruby OpenSSL)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup.sh

      - *clone-rubygems-server

      - name: Run HTTP server, PQC TLS proxy, and client
        run: |
          script/run_http_server.sh &
          sleep 2
          script/run_https_reverse_proxy.rb -p &
          sleep 2
          script/run_https_client.sh -p

  rubygems-pqc-https-reverse-proxy-nginx:
    name: rubygems PQC HTTPS TLS reverse proxy (Nginx)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['4.0', 'head']
    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup_nginx.sh

      - *clone-rubygems-server

      - name: Run HTTP server, PQC Nginx TLS proxy, and client
        run: |
          script/run_http_server.sh &
          sleep 2
          script/run_https_reverse_proxy_nginx.sh -p &
          sleep 2
          script/run_https_client.sh -p
