    defaults:
      run:
        working-directory: rubygems
    steps:
      - uses: actions/checkout@v4
      - *setup-ruby
      - uses: ./.github/actions/setup-openssl

      - name: Setup
        run: script/setup_nginx.sh

      - *clone-rubygems-server

      - name: Run HTTP server, PQC dual Nginx TLS proxy, and client
