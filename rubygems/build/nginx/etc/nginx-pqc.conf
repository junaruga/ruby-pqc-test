worker_processes 1;
daemon off;
error_log stderr info;
pid tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stderr;
    client_body_temp_path tmp/client_body;
    proxy_temp_path tmp/proxy;
    fastcgi_temp_path tmp/fastcgi;
    uwsgi_temp_path tmp/uwsgi;
    scgi_temp_path tmp/scgi;

    server {
        listen 18443 ssl;
        server_name localhost;

        ssl_certificate ../../ssl/mldsa65-2.crt;
        ssl_certificate_key ../../ssl/mldsa65-2.key;
        ssl_certificate ../../ssl/rsa-2.crt;
        ssl_certificate_key ../../ssl/rsa-2.key;
        ssl_conf_command SignatureAlgorithms rsa_pss_rsae_sha256:mldsa65;

        location / {
            proxy_pass http://127.0.0.1:18808;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
